name: 'Deploy to GitHub Pages'
description: 'Incrementally deploys content to a GitHub Pages repository'

inputs:
  source-dir:
    description: 'Source directory to deploy'
    required: true
  repo:
    description: 'Target repository (owner/repo)'
    required: true
  branch:
    description: 'Target branch'
    required: false
    default: 'main'
  token:
    description: 'GitHub token with push access'
    required: true
  commit-message:
    description: 'Commit message'
    required: false
    default: 'Deploy: ${{ github.sha }}'
  preserve-cname:
    description: 'Preserve CNAME file'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Configure Git
      shell: bash
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Clone target repository
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
      run: |
        git clone --depth 1 --branch ${{ inputs.branch }} \
          "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ inputs.repo }}.git" _deploy \
          || git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ inputs.repo }}.git" _deploy

    - name: Incremental deploy
      shell: bash
      run: |
        # Bootstrap deployed-ids.txt
        touch _deploy/deployed-ids.txt

        # Read post IDs (not slugs) - the actual directory structure is posts/{id}/{slug}/
        mapfile -t CURRENT_IDS < <(jq -r '.[].id' data/blog-posts.json 2>/dev/null || true)
        mapfile -t DEPLOYED_IDS < <(grep -v '^[[:space:]]*$' _deploy/deployed-ids.txt || true)

        cd _deploy
        git checkout ${{ inputs.branch }} 2>/dev/null || git checkout -b ${{ inputs.branch }}

        # Wipe non-post files, preserving posts/, deployed-ids.txt, CNAME, .git
        find . -maxdepth 1 \
          ! -name '.' \
          ! -name '.git' \
          ! -name 'posts' \
          ! -name 'deployed-ids.txt' \
          ! -name 'CNAME' \
          -exec rm -rf {} +

        cd ..

        # Copy non-post files from source-dir into _deploy
        if command -v rsync > /dev/null 2>&1; then
          rsync -a --exclude='posts/' ${{ inputs.source-dir }}/ _deploy/
        else
          # cp -r fallback: copy everything except posts/
          for item in ${{ inputs.source-dir }}/*/; do
            name=$(basename "$item")
            [ "$name" = "posts" ] && continue
            cp -r "$item" _deploy/
          done
          # copy top-level files
          for item in ${{ inputs.source-dir }}/*; do
            [ -d "$item" ] && continue
            cp "$item" _deploy/
          done
        fi
        touch _deploy/.nojekyll

        # Read post IDs (not slugs) - the actual directory structure is posts/{id}/{slug}/
        mapfile -t CURRENT_IDS < <(jq -r '.[].id' data/blog-posts.json 2>/dev/null || true)
        mapfile -t DEPLOYED_IDS < <(grep -v '^[[:space:]]*$' _deploy/deployed-ids.txt || true)

        # Build lookup maps
        declare -A CURRENT_MAP
        for id in "${CURRENT_IDS[@]}"; do
          CURRENT_MAP["$id"]=1
        done
        declare -A DEPLOYED_MAP
        for id in "${DEPLOYED_IDS[@]}"; do
          DEPLOYED_MAP["$id"]=1
        done

        # New: in current but missing from manifest OR missing from disk
        NEW_IDS=()
        for id in "${CURRENT_IDS[@]}"; do
          if [ -z "${DEPLOYED_MAP[$id]+x}" ] || [ ! -d "_deploy/posts/$id" ]; then
            NEW_IDS+=("$id")
          fi
        done

        # Orphaned: in manifest but not in current
        ORPHANED_IDS=()
        for id in "${DEPLOYED_IDS[@]}"; do
          [ -z "${CURRENT_MAP[$id]+x}" ] && ORPHANED_IDS+=("$id")
        done

        # Copy new post dirs (structure: posts/{id}/{slug}/)
        mkdir -p _deploy/posts
        for id in "${NEW_IDS[@]}"; do
          src="${{ inputs.source-dir }}/posts/$id"
          if [ -d "$src" ]; then
            cp -r "$src" "_deploy/posts/$id"
          fi
        done

        # Remove orphaned post dirs
        for id in "${ORPHANED_IDS[@]}"; do
          dir="_deploy/posts/$id"
          if [ -d "$dir" ]; then
            git -C _deploy rm -rf "posts/$id"
          fi
        done

        # Update deployed-ids.txt with current IDs
        printf '%s\n' "${CURRENT_IDS[@]}" > _deploy/deployed-ids.txt

        # Selective git add
        cd _deploy
        # Add non-post files
        git add --all -- ':!posts/'
        # Add new post dirs
        for id in "${NEW_IDS[@]}"; do
          [ -d "posts/$id" ] && git add "posts/$id"
        done

        # Commit only if staged diff is non-empty
        git diff --staged --quiet || git commit -m "${{ inputs.commit-message }}"
        git push origin ${{ inputs.branch }}
