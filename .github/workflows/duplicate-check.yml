name: 🔍 Duplicate Detection

on:
  schedule:
    # Run weekly on Sunday at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      content_type:
        description: 'Content type to check'
        required: false
        default: 'question'
        type: choice
        options:
          - question
          - challenge
          - test
          - certification
      channel:
        description: 'Specific channel (leave empty for all)'
        required: false
        default: ''
      auto_fix:
        description: 'Automatically fix duplicates'
        required: false
        default: false
        type: boolean

permissions:
  issues: write
  contents: read

jobs:
  check-duplicates:
    name: 🔍 Check for Duplicates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: ./.github/actions/setup-bot
      
      - name: Initialize Vector DB
        env:
          SQLITE_URL: ${{ secrets.SQLITE_URL }}
        run: |
          echo "Checking vector DB status..."
          pnpm run vector:stats || echo "Vector DB not available, will use fallback"
      
      - name: Run Duplicate Detection
        id: duplicate-check
        env:
          SQLITE_URL: ${{ secrets.SQLITE_URL }}
        run: |
          ARGS="--report"
          
          if [ -n "${{ inputs.content_type }}" ]; then
            ARGS="$ARGS --type=${{ inputs.content_type }}"
          fi
          
          if [ -n "${{ inputs.channel }}" ]; then
            ARGS="$ARGS --channel=${{ inputs.channel }}"
          fi
          
          if [ "${{ inputs.auto_fix }}" == "true" ]; then
            ARGS="$ARGS --fix"
          fi
          
          echo "Running: node script/check-duplicates.js $ARGS"
          node script/check-duplicates.js $ARGS
          
          # Check if duplicates were found by reading the generated report
          REPORT_FILE=$(ls duplicate-report-*.json 2>/dev/null | head -1)
          if [ -n "$REPORT_FILE" ]; then
            DUPLICATE_COUNT=$(node -e "const r=JSON.parse(require('fs').readFileSync('$REPORT_FILE'));process.stdout.write(String(r.duplicateCount||0));")
            if [ "$DUPLICATE_COUNT" != "0" ]; then
              echo "duplicates_found=true" >> $GITHUB_OUTPUT
            else
              echo "duplicates_found=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "duplicates_found=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Upload Duplicate Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: duplicate-report-${{ github.run_number }}
          path: duplicate-report-*.json
          retention-days: 30
      
      - name: Generate Summary
        if: always()
        run: |
          echo "## 🔍 Duplicate Detection Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Content Type:** ${{ inputs.content_type || 'question' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Channel:** ${{ inputs.channel || 'all' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Auto-fix:** ${{ inputs.auto_fix }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f duplicate-report-*.json ]; then
            echo "📄 Detailed report available in artifacts" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Create Issue if Duplicates Found
        if: steps.duplicate-check.outputs.duplicates_found == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const files = fs.readdirSync('.').filter(f => f.startsWith('duplicate-report-'));
            
            if (files.length > 0) {
              const report = JSON.parse(fs.readFileSync(files[0], 'utf8'));
              
              if (report.duplicateCount > 0) {
                const duplicatePairs = report.duplicatePairs.slice(0, 10).map(pair => {
                  const dups = pair.duplicates.map(d => '`' + d.id + '` (' + d.similarity + '%)').join(', ');
                  return '- `' + pair.original + '` has ' + pair.duplicates.length + ' duplicate(s): ' + dups;
                }).join('\n');
                
                const moreText = report.duplicatePairs.length > 10 ? '\n_...and ' + (report.duplicatePairs.length - 10) + ' more pairs_' : '';
                const channelArg = report.channel ? ' --channel=' + report.channel : '';
                
                const codeBlock = '```bash\n# Review duplicates\npnpm run check:duplicates -- --type=' + report.contentType + channelArg + '\n\n# Auto-fix (mark for deletion)\npnpm run check:duplicates:fix -- --type=' + report.contentType + channelArg + '\n```';
                
                const issueBody = '## Duplicate Detection Report\n\n' +
                  '**Content Type:** ' + report.contentType + '\n' +
                  '**Channel:** ' + (report.channel || 'all') + '\n' +
                  '**Total Scanned:** ' + report.totalScanned + '\n' +
                  '**Duplicate Pairs:** ' + report.duplicateCount + '\n\n' +
                  '### Action Required\n' +
                  'Review the duplicate pairs and decide whether to:\n' +
                  '1. Delete duplicates\n' +
                  '2. Merge content\n' +
                  '3. Mark as false positive\n\n' +
                  '### Duplicate Pairs\n' +
                  duplicatePairs + '\n' +
                  moreText + '\n\n' +
                  '### How to Fix\n' +
                  codeBlock + '\n\n' +
                  '---\n' +
                  '_Generated by [Duplicate Detection Workflow](' + context.payload.repository.html_url + '/actions/runs/' + context.runId + ')_';
                
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: '🚨 Duplicates Detected: ' + report.duplicateCount + ' pairs found',
                  body: issueBody,
                  labels: ['duplicate', 'content-quality', 'automated']
                });
              }
            }

  # Run reconciliation after duplicate check
  reconcile-after-cleanup:
    name: 🔄 Reconcile Content
    needs: check-duplicates
    if: inputs.auto_fix == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: ./.github/actions/setup-bot
      
      - name: Run Reconciliation
        continue-on-error: true # script/bots/reconciliation-bot.js does not exist yet
        env:
          SQLITE_URL: ${{ secrets.SQLITE_URL }}
        run: |
          echo "Running reconciliation after duplicate cleanup..."
          pnpm run bot:reconcile -- --threshold=0.75
      
      - name: Summary
        run: |
          echo "## 🔄 Reconciliation Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Content has been reconciled after duplicate cleanup" >> $GITHUB_STEP_SUMMARY
