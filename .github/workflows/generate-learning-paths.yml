name: Generate Curated Learning Paths

on:
  workflow_dispatch:
  push:
    paths:
      - client/src/lib/channels-config.ts

permissions:
  contents: write

jobs:
  generate-paths:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node-pnpm

      - name: Generate curated learning paths
        env:
          SQLITE_URL: ${{ secrets.SQLITE_URL }}
          
          
        run: node script/generate-curated-paths.js

      - name: Commit and push if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'Curated Paths Bot'
          git config --global user.email 'bot@github-actions'
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "🎓 Update curated learning paths [automated]" && git push)
