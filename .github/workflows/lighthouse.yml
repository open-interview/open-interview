name: 🔦 Lighthouse Audit

on:
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 6 AM UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to audit (default: local build)'
        required: false
        default: ''

jobs:
  lighthouse:
    name: 🔦 Lighthouse Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm

      - name: Fetch build data
        run: |
          node script/fetch-questions-for-build.js
          node script/fetch-question-history.js
          node script/generate-curated-paths.js
          node script/generate-rss.js
          node script/generate-sitemap.js
        env:
          SQLITE_URL: ${{ secrets.SQLITE_URL }}
          
          SQLITE_URL: ${{ secrets.SQLITE_URL }}
          

      - name: Build application
        run: pnpm run build && pnpm run build:pagefind

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Lighthouse audits
        run: pnpm exec playwright test --project=lighthouse --reporter=list
        env:
          CI: 'true'
          LIGHTHOUSE_URL: ${{ inputs.url || 'http://localhost:5001' }}

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-reports-${{ github.run_number }}
          path: |
            lighthouse-reports/
            playwright-report/
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## 🔦 Lighthouse Audit Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Reports available in artifacts: \`lighthouse-reports-${{ github.run_number }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Category | Threshold |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Performance | ≥ 70 |" >> $GITHUB_STEP_SUMMARY
          echo "| Accessibility | ≥ 90 |" >> $GITHUB_STEP_SUMMARY
          echo "| Best Practices | ≥ 80 |" >> $GITHUB_STEP_SUMMARY
          echo "| SEO | ≥ 80 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pages audited:** home, channels" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
