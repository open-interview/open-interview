name: 🚀 Deploy Astro Blog

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      clean:
        description: 'Clean export dir before exporting'
        type: boolean
        default: false

  # Auto-trigger after content pipeline
  workflow_run:
    workflows: ['🤖 Content Pipeline']
    types: [completed]
    branches: [main]

  # Also trigger on direct pushes that change blog data or the Astro project
  push:
    branches: [main]
    paths:
      - 'client/public/blog-data.json'
      - 'data/blog-posts.json'
      - 'scripts/export-to-astro.mjs'
      - 'scripts/transform-blog-posts.mjs'
      - 'blog-astro/**'

permissions:
  contents: write

# Allow only one concurrent deployment
concurrency:
  group: 'astro-blog-deploy'
  cancel-in-progress: false

jobs:
  build:
    name: Build & Deploy Astro Blog
    runs-on: ubuntu-latest
    # Skip if triggered by a failed workflow_run
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── Export JSON → Markdown ─────────────────────────────────────────────
      # export-to-astro.mjs uses only Node.js built-ins (fs, path, url)
      # so no npm install is required for this step.
      - name: Export blog posts to Astro content
        run: node scripts/export-to-astro.mjs ${{ inputs.clean == true && '--clean' || '' }}

      - name: Count exported posts
        run: |
          COUNT=$(ls blog-astro/src/content/blog/*.md 2>/dev/null | wc -l)
          echo "✅ Exported $COUNT posts to blog-astro/src/content/blog/"
          echo "POST_COUNT=$COUNT" >> "$GITHUB_ENV"

      # ── Astro build ────────────────────────────────────────────────────────
      - name: Install Astro dependencies
        working-directory: blog-astro
        run: npm install

      - name: Build Astro site
        working-directory: blog-astro
        run: npm run build

      # ── Deploy via git-push to gh-pages (same mechanism as ci-cd.yml) ──────
      - uses: ./.github/actions/deploy-pages
        with:
          source-dir: blog-astro/dist
          repo: ${{ vars.BLOG_REPO || 'open-interview/open-interview.github.io' }}
          branch: gh-pages
          token: ${{ secrets.GH_TOKEN }}
          commit-message: "deploy(astro-blog): ${{ env.POST_COUNT }} posts (run #${{ github.run_number }})"
          preserve-cname: 'true'
