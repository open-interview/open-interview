name: 🤖 Content Pipeline

on:
  schedule:
    - cron: '0 * * * *'    # Hourly: quick-generate
    - cron: '0 2 * * *'    # Daily 2AM: full pipeline
    - cron: '0 8 * * *'    # Daily 8AM: blog post
  workflow_dispatch:
    inputs:
      mode:
        description: 'Generation mode'
        required: true
        default: 'full-pipeline'
        type: choice
        options: [quick, full-pipeline, intake, blog, specific-stage, editorial-override, elite-blog]
      stage:
        description: 'Specific stage (for specific-stage mode)'
        required: false
        type: choice
        options: [creator, analysis, verifier, processor, blog-generator, voice-sessions, interview-intelligence, coding-challenges, flashcards, similar-questions, learning-paths, certification-questions, readme, rss-sitemap]
      count:
        description: 'Items to process'
        required: false
        default: '10'
      channel:
        description: 'Specific channel'
        required: false
        default: ''
      topic:
        description: 'Topic for blog generation (mode=blog)'
        required: false
      publish:
        description: 'Deploy blog after generation (mode=blog)'
        required: false
        default: true
        type: boolean
      question:
        description: 'Question to add (mode=intake)'
        required: false
      override_payload:
        description: 'Editorial: {"action":"patch","id":"ID","fields":{...}} or {"action":"delete","id":"ID"}'
        required: false

jobs:

  quick-generate:
    name: 🚀 Quick Generate (${{ matrix.task }})
    if: |
      (github.event.schedule == '0 * * * *' && github.event.schedule != '0 2 * * *' && github.event.schedule != '0 8 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'quick')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    strategy:
      matrix:
        task: [questions, flashcards, voice-sessions]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bot
      - name: Run ${{ matrix.task }}
        env:
          INPUT_LIMIT: ${{ inputs.channel && inputs.count || '25' }}
          INPUT_CHANNEL: ${{ inputs.channel }}
          BALANCE_CHANNELS: 'true'
          AGGRESSIVE_MODE: 'true'
          ENSURE_MINIMUM: 'true'
        run: |
          case "${{ matrix.task }}" in
            questions)        pnpm run generate:question ;;
            flashcards)       pnpm run bot:flashcard -- --limit=50 ;;
            voice-sessions)   pnpm run bot:sessions -- --limit=20 ;;
          esac
        continue-on-error: true
      - name: Sync static data files
        if: success()
        run: pnpm run fetch:data || true
      - name: Commit generated content
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -- . 2>/dev/null || true; git pull --rebase origin main || true
          git add data/questions/ data/flashcards/ data/meta/ data/voice-sessions.json client/public/data/ 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "chore: quick-generate ${{ matrix.task }} [skip ci]" && git push)
      - name: Log quick-generate event
        if: always()
        run: |
          STATUS=$([ "${{ job.status }}" = "success" ] && echo "success" || echo "failed")
          TYPE="bot_run"
          LINKS='[{"label":"View channels","url":"https://open-interview.github.io/channels"}]'
          case "${{ matrix.task }}" in
            questions)      TYPE="question_added" ; LINKS='[{"label":"View questions","url":"https://open-interview.github.io/channels"},{"label":"Content data","url":"https://github.com/satishkumar-dhule/code-reels/tree/main/data"}]' ;;
            flashcards)     TYPE="flashcard"      ; LINKS='[{"label":"View flashcards","url":"https://open-interview.github.io/flashcards"},{"label":"Content data","url":"https://github.com/satishkumar-dhule/code-reels/tree/main/data"}]' ;;
            voice-sessions) TYPE="voice_session"  ; LINKS='[{"label":"View voice sessions","url":"https://open-interview.github.io/voice"},{"label":"Content data","url":"https://github.com/satishkumar-dhule/code-reels/tree/main/data"}]' ;;
          esac
          node script/log-event.js \
            --type="$TYPE" \
            --title="Quick-generate: ${{ matrix.task }}" \
            --status="$STATUS" \
            --workflow="content.yml" \
            --description="Hourly quick-generate run for ${{ matrix.task }}" \
            --links="$LINKS"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -- . 2>/dev/null || true; git pull --rebase origin main || true
          git add -f client/public/data/events.json
          git diff --cached --quiet || (git commit -m "chore: log quick-generate event [skip ci]" && git push)

  ingest:
    name: 📥 Ingest (${{ matrix.bot }})
    if: |
      (github.event.schedule == '0 2 * * *') ||
      (github.event_name == 'workflow_dispatch' && (inputs.mode == 'full-pipeline' || inputs.stage == 'creator' || inputs.stage == 'analysis' || inputs.stage == 'verifier' || inputs.stage == 'processor'))
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix:
        bot: [creator, analysis, verifier, processor]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bot
      - name: Run ${{ matrix.bot }} bot
        env:
          COUNT: ${{ inputs.count || '5' }}
          BALANCE_CHANNELS: 'true'
          MODE: scan
          LIMIT: ${{ inputs.count || '10' }}
          MAX_ITEMS: ${{ inputs.count || '10' }}
        run: |
          case "${{ matrix.bot }}" in
            creator)   pnpm run bot:creator ;;
            analysis)  pnpm run bot:analysis -- --limit=${{ inputs.count || '100' }} ;;
            verifier)  pnpm run bot:verifier ;;
            processor) pnpm run bot:processor ;;
          esac
        continue-on-error: true
      - name: Commit ingest output
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -- . 2>/dev/null || true; git pull --rebase origin main || true
          git add data/questions/ data/meta/ 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "chore: ingest ${{ matrix.bot }} [skip ci]" && git push)

  enrich:
    name: ✨ Enrich (${{ matrix.stage }})
    if: |
      (github.event.schedule == '0 2 * * *') ||
      (github.event_name == 'workflow_dispatch' && (inputs.mode == 'full-pipeline' || inputs.stage == 'blog-generator' || inputs.stage == 'voice-sessions' || inputs.stage == 'interview-intelligence' || inputs.stage == 'coding-challenges' || inputs.stage == 'flashcards' || inputs.stage == 'similar-questions' || inputs.stage == 'learning-paths' || inputs.stage == 'certification-questions' || inputs.stage == 'readme' || inputs.stage == 'rss-sitemap'))
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    strategy:
      matrix:
        stage: [blog-generator, voice-sessions, interview-intelligence, coding-challenges, flashcards, similar-questions, learning-paths, certification-questions, readme, rss-sitemap]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bot
      - name: Run ${{ matrix.stage }}
        env:
          INPUT_COUNT: ${{ inputs.count || '2' }}
          INPUT_DIFFICULTY: 'random'
          INPUT_CATEGORY: 'random'
        run: |
          case "${{ matrix.stage }}" in
            blog-generator)           pnpm run blog:generate ;;
            voice-sessions)           pnpm run bot:sessions -- --limit=50 ;;
            interview-intelligence)   pnpm run rag:intelligence ;;
            coding-challenges)        pnpm run bot:coding-challenge ;;
            flashcards)               pnpm run bot:flashcard -- --limit=50 ;;
            similar-questions)        pnpm run vector:similar ;;
            learning-paths)           pnpm run generate:learning-paths ;;
            certification-questions)  pnpm run generate:certification ;;
            readme)                   pnpm run generate:readme ;;
            rss-sitemap)              pnpm run generate:rss && pnpm run generate:sitemap ;;
          esac
        continue-on-error: true
      - name: Commit enrich output
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -- . 2>/dev/null || true; git pull --rebase origin main || true
          git add data/ content/posts/ 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "chore: enrich ${{ matrix.stage }} [skip ci]" && git push)

  finalize:
    name: 📊 Finalize (monitor + summary)
    needs: [ingest, enrich]
    if: |
      always() &&
      (needs.ingest.result != 'skipped' || needs.enrich.result != 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bot
      - name: Generate static data files
        run: |
          pnpm run fetch:data || true
          pnpm run fetch:history || true
          pnpm run generate:paths || true
          pnpm run fetch:bot-monitor || true
      - name: Commit and push with retry
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          MAX_RETRIES=3
          for attempt in $(seq 1 $MAX_RETRIES); do
            git add -f client/public/data/ data/questions/ data/meta/ data/blog-posts/ content/posts/ 2>/dev/null || true
            if ! git diff --staged --quiet; then
              git commit -m "chore: update static data files [skip ci]" && git fetch origin main --quiet
              if git push origin main; then echo "Push succeeded"; exit 0; fi
            else
              echo "No changes to commit"; exit 0
            fi
            sleep 5; git reset --hard origin/main
          done
          echo "Failed to push after $MAX_RETRIES attempts"; exit 1
      - name: Log content pipeline event
        if: always()
        run: |
          STATUS=$([ "${{ job.status }}" = "success" ] && echo "success" || echo "failed")
          INGEST="${{ needs.ingest.result }}"
          ENRICH="${{ needs.enrich.result }}"
          node script/log-event.js \
            --type=bot_run \
            --title="Content pipeline completed" \
            --status="$STATUS" \
            --workflow="content.yml" \
            --description="Full pipeline: ingest=$INGEST, enrich=$ENRICH — static data files updated" \
            --meta="{\"ingest\":\"$INGEST\",\"enrich\":\"$ENRICH\",\"trigger\":\"${{ github.event_name }}\"}" \
            --links='[{"label":"View content data","url":"https://github.com/satishkumar-dhule/code-reels/tree/main/data"},{"label":"View questions","url":"https://open-interview.github.io/channels"}]'
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -- . 2>/dev/null || true; git pull --rebase origin main || true
          git add -f client/public/data/events.json
          git diff --cached --quiet || (git commit -m "chore: log content pipeline event [skip ci]" && git push)
      - name: Pipeline summary
        if: always()
        run: |
          echo "## 🤖 Content Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📥 Ingest | ${{ needs.ingest.result == 'success' && '✅' || needs.ingest.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ✨ Enrich | ${{ needs.enrich.result == 'success' && '✅' || needs.enrich.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

  elite-blog:
    name: 🏆 Elite Blog Generation
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'elite-blog'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bot
      - name: Generate elite blog posts
        env:
          OPENCODE_MODEL: opencode/big-pickle
        run: pnpm run blog:elite:all
      - name: Commit generated blog posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -- . 2>/dev/null || true; git pull --rebase origin main || true
          git add content/posts/ data/blog-posts.json client/public/blog-data.json 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "chore: generate elite blog posts [skip ci]" && git push)
      - name: Log elite blog event
        if: always()
        run: |
          STATUS=$([ "${{ job.status }}" = "success" ] && echo "success" || echo "failed")
          node script/log-event.js \
            --type=blog_elite \
            --title="Elite blog generation" \
            --status="$STATUS" \
            --workflow="content.yml" \
            --description="Elite blog generation pipeline completed" \
            --links='[{"label":"View blog","url":"https://open-interview.github.io/blog"}]'
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -- . 2>/dev/null || true; git pull --rebase origin main || true
          git add -f client/public/data/events.json 2>/dev/null || true
          git diff --cached --quiet || (git commit -m "chore: log elite blog event [skip ci]" && git push)

  daily-blog:
    name: 📝 Daily Blog
    if: github.event.schedule == '0 8 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bot
      - name: Generate 10 elite blog posts
        env:
          OPENCODE_MODEL: opencode/big-pickle
        run: pnpm run blog:elite:all
      - name: Commit generated blog posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -- . 2>/dev/null || true; git pull --rebase origin main || true
          git add content/posts/ data/blog-posts.json client/public/blog-data.json 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "chore: daily elite blog posts [skip ci]" && git push)
      - name: Trigger deploy
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: 'ci-cd.yml', ref: 'main'
            });

  manual-intake:
    name: 📥 Manual Intake
    if: |
      github.event_name == 'workflow_dispatch' && inputs.mode == 'intake'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-bot
      - name: Process and add question
        env:
          INPUT_QUESTION: ${{ inputs.question }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          CI: 'true'
        run: pnpm run generate:question:random
      - name: Regenerate RSS feed
        run: pnpm run generate:rss
      - name: Commit new question
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -- . 2>/dev/null || true; git pull --rebase origin main || true
          git add data/questions/ data/meta/
          git diff --staged --quiet || (git commit -m "chore: add question via manual intake [skip ci]" && git push)
      - name: Log manual intake event
        if: always()
        run: |
          STATUS=$([ "${{ job.status }}" = "success" ] && echo "success" || echo "failed")
          node script/log-event.js \
            --type=question_added \
            --title="Manual question intake" \
            --status="$STATUS" \
            --workflow="content.yml" \
            --description="Manual question added via workflow dispatch" \
            --meta="{\"mode\":\"manual-intake\"}" \
            --links='[{"label":"View questions","url":"https://open-interview.github.io/channels"},{"label":"Source data","url":"https://github.com/satishkumar-dhule/code-reels/tree/main/data"}]'
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -- . 2>/dev/null || true; git pull --rebase origin main || true
          git add -f client/public/data/events.json
          git diff --cached --quiet || (git commit -m "chore: log intake event [skip ci]" && git push)
      - name: Trigger deploy
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({ owner: context.repo.owner, repo: context.repo.repo, workflow_id: 'ci-cd.yml', ref: 'main' });

  manual-blog:
    name: 📝 Manual Blog
    if: |
      github.event_name == 'workflow_dispatch' && inputs.mode == 'blog'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bot
      - name: Generate blog post
        id: generate
        env:
          INPUT_TOPIC: ${{ inputs.topic }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -n "$INPUT_TOPIC" ]; then
            pnpm run blog:generate:from-input
          else
            pnpm run blog:generate
          fi
      - name: Commit and publish
        if: success() && inputs.publish
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -- . 2>/dev/null || true; git pull --rebase origin main || true
          git add -f data/blog-posts/ content/posts/
          git diff --staged --quiet || (git commit -m "chore: update blog posts data [skip ci]" && git push)
      - name: Trigger blog deploy
        if: success() && inputs.publish
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({ owner: context.repo.owner, repo: context.repo.repo, workflow_id: 'deploy-blog.yml', ref: 'main' });

  editorial-override:
    name: ✏️ Editorial Override
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'editorial-override'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply override
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const postsDir = 'data/blog-posts';
            const payload = JSON.parse('${{ inputs.override_payload }}');
            const { action, id, fields } = payload;

            if (action === 'delete') {
              const files = fs.readdirSync(postsDir).filter(f => f.startsWith(id + '--'));
              if (files.length === 0) core.setFailed(`Post ${id} not found`);
              files.forEach(f => fs.unlinkSync(path.join(postsDir, f)));
              core.info(`Deleted ${files.length} file(s) for post ${id}`);
            } else if (action === 'patch') {
              const files = fs.readdirSync(postsDir).filter(f => f.startsWith(id + '--'));
              if (files.length === 0) core.setFailed(`Post ${id} not found`);
              else {
                const fname = files[0];
                const post = JSON.parse(fs.readFileSync(path.join(postsDir, fname), 'utf8'));
                Object.assign(post, fields);
                fs.writeFileSync(path.join(postsDir, fname), JSON.stringify(post, null, 2));
                core.info(`Patched post ${id}`);
              }
            } else {
              core.setFailed(`Unknown action: ${action}. Use 'patch' or 'delete'`);
            }
      - name: Sync MDX file
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const payload = JSON.parse('${{ inputs.override_payload }}');
            const { action, id } = payload;
            const postsDir = 'content/posts';
            const files = fs.readdirSync(postsDir).filter(f => f.startsWith(id + '--'));
            if (action === 'delete') {
              files.forEach(f => fs.unlinkSync(path.join(postsDir, f)));
              core.info(`Deleted MDX: ${files.join(', ')}`);
            } else if (action === 'patch' && files.length > 0) {
              const blogDir = 'data/blog-posts';
              const blogFiles = fs.readdirSync(blogDir).filter(f => f.startsWith(id + '--'));
              if (blogFiles.length > 0) {
                const post = JSON.parse(fs.readFileSync(path.join(blogDir, blogFiles[0]), 'utf8'));
                const slug = post.blogSlug || '';
                const fname = path.join(postsDir, `${id}--${slug}.mdx`);
                files.filter(f => f !== `${id}--${slug}.mdx`).forEach(f => fs.unlinkSync(path.join(postsDir, f)));
                core.info(`MDX sync: ${fname}`);
              }
            }
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/blog-posts/ content/posts/
          git diff --staged --quiet || (git commit -m "editorial: ${{ inputs.override_payload }}" && git push)
      - name: Trigger deploy
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: 'deploy-blog.yml', ref: 'main'
            });
