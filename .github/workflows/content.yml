name: 🤖 Content Pipeline

# Replaces: content-generation.yml + manual-intake.yml + manual-blog.yml

on:
  schedule:
    - cron: '0 * * * *'    # Hourly: quick-generate
    - cron: '0 2 * * *'    # Daily 2AM: full pipeline
    - cron: '0 8 * * *'    # Daily 8AM: flashcards
  workflow_dispatch:
    inputs:
      mode:
        description: 'Generation mode'
        required: true
        default: 'full-pipeline'
        type: choice
        options: [quick, full-pipeline, intake, blog, specific-stage]
      stage:
        description: 'Specific stage (for specific-stage mode)'
        required: false
        type: choice
        options: [creator, analysis, verifier, processor, blog-generator, voice-sessions, interview-intelligence, coding-challenges]
      count:
        description: 'Items to process'
        required: false
        default: '10'
      channel:
        description: 'Specific channel'
        required: false
        default: ''
      aggressive:
        description: 'Prioritize empty channels'
        required: false
        default: 'true'
        type: boolean
      topic:
        description: 'Topic for blog generation (mode=blog)'
        required: false
      publish:
        description: 'Deploy blog after generation (mode=blog)'
        required: false
        default: true
        type: boolean
      question:
        description: 'Question to add (mode=intake)'
        required: false

jobs:
  # ── Hourly ──────────────────────────────────────────────────────────────────
  quick-generate:
    name: 🚀 Quick Generate
    if: |
      (github.event.schedule == '0 * * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'quick')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-bot
      - name: Generate questions
        env:
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          SQLITE_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          INPUT_LIMIT: ${{ inputs.channel && inputs.count || '25' }}
          INPUT_CHANNEL: ${{ inputs.channel }}
          BALANCE_CHANNELS: 'true'
          AGGRESSIVE_MODE: 'true'
          ENSURE_MINIMUM: 'true'
        run: node script/generate-question.js
      - name: Sync to Vector DB
        if: success()
        env:
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          SQLITE_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: node script/sync-vector-db.js --mode=incremental || true

  # ── Daily 2AM full pipeline ──────────────────────────────────────────────────
  ingest:
    name: 📥 Ingest (creator → analysis → verifier → processor)
    if: |
      (github.event.schedule == '0 2 * * *') ||
      (github.event_name == 'workflow_dispatch' && (inputs.mode == 'full-pipeline' || inputs.stage == 'creator' || inputs.stage == 'analysis' || inputs.stage == 'verifier' || inputs.stage == 'processor'))
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-bot
      - name: Creator Bot
        env:
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          SQLITE_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          COUNT: ${{ inputs.count || '5' }}
          BALANCE_CHANNELS: 'true'
        run: node script/bots/creator-bot.js
      - name: Analysis Bot
        env:
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          SQLITE_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: node script/bots/analysis-bot.js --limit=${{ inputs.count || '100' }}
      - name: Verifier Bot
        env:
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          SQLITE_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          MODE: scan
          LIMIT: ${{ inputs.count || '10' }}
        run: node script/bots/verifier-bot.js
      - name: Processor Bot
        env:
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          SQLITE_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          MAX_ITEMS: ${{ inputs.count || '10' }}
        run: node script/bots/processor-bot.js

  enrich:
    name: ✨ Enrich (blog + voice + intelligence + coding)
    needs: ingest
    if: |
      always() &&
      ((github.event.schedule == '0 2 * * *') ||
      (github.event_name == 'workflow_dispatch' && (inputs.mode == 'full-pipeline' || inputs.stage == 'blog-generator' || inputs.stage == 'voice-sessions' || inputs.stage == 'interview-intelligence' || inputs.stage == 'coding-challenges')))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-bot
      - name: Blog Generator
        env:
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          SQLITE_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: node script/generate-blog.js
        continue-on-error: true
      - name: Voice Sessions
        env:
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          SQLITE_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: node script/generate-voice-sessions.js --use-vector-db --limit=50
        continue-on-error: true
      - name: Interview Intelligence
        env:
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          SQLITE_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: node script/generate-interview-intelligence.js
        continue-on-error: true
      - name: Coding Challenges
        env:
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          SQLITE_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          INPUT_COUNT: ${{ inputs.count || '2' }}
          INPUT_DIFFICULTY: 'random'
          INPUT_CATEGORY: 'random'
        run: node script/coding-challenge-bot.js
        continue-on-error: true

  finalize:
    name: 📊 Finalize (monitor + summary)
    needs: [ingest, enrich]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-node-pnpm
      - name: Generate monitor data
        env:
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          SQLITE_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: node script/fetch-bot-monitor-data.js
      - name: Commit and push with retry
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          MAX_RETRIES=3
          for attempt in $(seq 1 $MAX_RETRIES); do
            git add -f client/public/data/bot-monitor.json client/public/data/intelligence/ client/public/data/voice-sessions/ 2>/dev/null || true
            if ! git diff --staged --quiet; then
              git commit -m "Update bot monitor [skip ci]" && git fetch origin main --quiet
              if git push origin main; then echo "✅ Push succeeded"; exit 0; fi
            else
              echo "No changes to commit"; exit 0
            fi
            sleep 5; git reset --hard origin/main
          done
          echo "❌ Failed to push after $MAX_RETRIES attempts"; exit 1
      - name: Pipeline summary
        if: always()
        run: |
          echo "## 🤖 Content Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 Quick | ${{ needs.quick-generate.result == 'success' && '✅' || needs.quick-generate.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📥 Ingest | ${{ needs.ingest.result == 'success' && '✅' || needs.ingest.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ✨ Enrich | ${{ needs.enrich.result == 'success' && '✅' || needs.enrich.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

  # ── Daily 8AM flashcards ─────────────────────────────────────────────────────
  flashcards-and-maintenance:
    name: 🃏 Flashcards + Maintenance
    if: |
      (github.event.schedule == '0 8 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'full-pipeline')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-bot
      - name: Flashcard Bot
        env:
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          SQLITE_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: node script/bots/flashcard-bot.js --limit=${{ inputs.count || '200' }}
        continue-on-error: true
      - name: Run migrations
        env:
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          SQLITE_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: node script/migrations/add-is-new-column.js || echo "Migration skipped"
      - name: Clear old new-flags
        env:
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          SQLITE_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: node script/maintenance/clear-old-new-flags.js

  # ── Manual intake ────────────────────────────────────────────────────────────
  manual-intake:
    name: 📥 Manual Intake
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'intake'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-bot
      - name: Process and add question
        env:
          INPUT_QUESTION: ${{ inputs.question }}
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          CI: 'true'
        run: node script/add-random-question.js
      - name: Regenerate RSS feed
        env:
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          SQLITE_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: node script/generate-rss.js
      - name: Trigger deploy
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({ owner: context.repo.owner, repo: context.repo.repo, workflow_id: 'ci-cd.yml', ref: 'main' });

  # ── Manual blog ──────────────────────────────────────────────────────────────
  manual-blog:
    name: 📝 Manual Blog
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'blog'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-bot
      - name: Generate blog post
        id: generate
        env:
          INPUT_TOPIC: ${{ inputs.topic }}
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: node script/generate-blog-from-input.js
      - name: Trigger blog deploy
        if: success() && inputs.publish
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({ owner: context.repo.owner, repo: context.repo.repo, workflow_id: 'deploy-blog.yml', ref: 'main' });
