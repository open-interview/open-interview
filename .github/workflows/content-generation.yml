name: 🤖 Content Generation

# Unified content generation workflow
# Combines: content-pipeline.yml + hourly-generator.yml
# Hourly: Quick question generation | Daily: Full pipeline

on:
  schedule:
    - cron: '0 * * * *'    # Hourly: Quick generation
    - cron: '0 2 * * *'    # Daily: Full pipeline
    - cron: '0 8 * * *'    # Daily: Flashcard generation
  
  workflow_dispatch:
    inputs:
      mode:
        description: 'Generation mode'
        required: true
        default: 'full-pipeline'
        type: choice
        options:
          - full-pipeline
          - quick-generate
          - specific-stage
      stage:
        description: 'Specific stage'
        required: false
        type: choice
        options:
          - creator
          - analysis
          - verifier
          - processor
          - blog-generator
          - voice-sessions
          - interview-intelligence
          - coding-challenges
      count:
        description: 'Items to process'
        required: false
        default: '10'
      channel:
        description: 'Specific channel'
        required: false
        default: ''
      aggressive:
        description: 'Prioritize empty channels'
        required: false
        default: 'true'
        type: boolean

jobs:
  quick-generate:
    name: 🚀 Quick Generate
    if: |
      (github.event.schedule == '0 * * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'quick-generate')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-bot
      
      - name: Determine channels
        id: channels
        run: |
          if [ -n "${{ inputs.channel }}" ]; then
            echo "channels=${{ inputs.channel }}" >> $GITHUB_OUTPUT
            echo "count=${{ inputs.count || '10' }}" >> $GITHUB_OUTPUT
          elif [ "${{ inputs.aggressive }}" == "true" ] || [ "${{ github.event_name }}" == "schedule" ]; then
            echo "channels=" >> $GITHUB_OUTPUT
            echo "count=25" >> $GITHUB_OUTPUT
          else
            echo "channels=" >> $GITHUB_OUTPUT
            echo "count=${{ inputs.count || '5' }}" >> $GITHUB_OUTPUT
          fi
      
      - name: Generate questions
        env:
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          SQLITE_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          INPUT_LIMIT: ${{ steps.channels.outputs.count }}
          INPUT_CHANNEL: ${{ steps.channels.outputs.channels }}
          BALANCE_CHANNELS: 'true'
          AGGRESSIVE_MODE: 'true'
          ENSURE_MINIMUM: 'true'
        run: node script/generate-question.js
      
      - name: Sync to Vector DB
        if: success()
        env:
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          SQLITE_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: node script/sync-vector-db.js --mode=incremental || true
  creator:
    name: 📝 Creator Bot
    if: |
      (github.event.schedule == '0 2 * * *') ||
      (github.event_name == 'workflow_dispatch' && (inputs.mode == 'full-pipeline' || inputs.stage == 'creator'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-bot
      - name: Run Creator Bot
        env:
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          SQLITE_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          COUNT: ${{ inputs.count || '5' }}
          BALANCE_CHANNELS: 'true'
        run: node script/bots/creator-bot.js
  maintenance:
    name: 🔧 Maintenance
    if: |
      (github.event.schedule == '0 2 * * *') ||
      (github.event_name == 'workflow_dispatch' && (inputs.mode == 'full-pipeline'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-bot
      - name: Run migrations
        env:
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          SQLITE_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: node script/migrations/add-is-new-column.js || echo "Migration skipped"
      - name: Clear old new-flags
        env:
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          SQLITE_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: node script/maintenance/clear-old-new-flags.js
  analysis:
    name: 🔍 Analysis Bot
    if: |
      always() &&
      ((github.event.schedule == '0 2 * * *') ||
      (github.event_name == 'workflow_dispatch' && (inputs.mode == 'full-pipeline' || inputs.stage == 'analysis')))
    needs: [creator]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-bot
      - name: Run Analysis Bot
        env:
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          SQLITE_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: node script/bots/analysis-bot.js --limit=${{ inputs.count || '100' }}
  verifier:
    name: ✅ Verifier Bot
    if: |
      always() &&
      ((github.event.schedule == '0 2 * * *') ||
      (github.event_name == 'workflow_dispatch' && (inputs.mode == 'full-pipeline' || inputs.stage == 'verifier')))
    needs: [analysis]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-bot
      - name: Run Verifier Bot
        env:
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          SQLITE_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          MODE: scan
          LIMIT: ${{ inputs.count || '10' }}
        run: node script/bots/verifier-bot.js
  processor:
    name: ⚙️ Processor Bot
    if: |
      always() &&
      ((github.event.schedule == '0 2 * * *') ||
      (github.event_name == 'workflow_dispatch' && (inputs.mode == 'full-pipeline' || inputs.stage == 'processor')))
    needs: [verifier]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-bot
      - name: Run Processor Bot
        env:
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          SQLITE_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          MAX_ITEMS: ${{ inputs.count || '10' }}
        run: node script/bots/processor-bot.js

  blog-generator:
    name: 📰 Blog Generator
    if: |
      always() &&
      ((github.event.schedule == '0 2 * * *') ||
      (github.event_name == 'workflow_dispatch' && (inputs.mode == 'full-pipeline' || inputs.stage == 'blog-generator')))
    needs: [processor]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-bot
      - name: Generate Blog
        env:
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          SQLITE_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: node script/generate-blog.js

  voice-sessions:
    name: 🎤 Voice Sessions
    if: |
      always() &&
      ((github.event.schedule == '0 2 * * *') ||
      (github.event_name == 'workflow_dispatch' && (inputs.mode == 'full-pipeline' || inputs.stage == 'voice-sessions')))
    needs: [processor]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-bot
      - name: Generate Voice Sessions
        env:
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          SQLITE_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: node script/generate-voice-sessions.js --use-vector-db --limit=50

  interview-intelligence:
    name: 🧠 Interview Intelligence
    if: |
      always() &&
      ((github.event.schedule == '0 2 * * *') ||
      (github.event_name == 'workflow_dispatch' && (inputs.mode == 'full-pipeline' || inputs.stage == 'interview-intelligence')))
    needs: [processor]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-bot
      - name: Generate Intelligence
        env:
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          SQLITE_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: node script/generate-interview-intelligence.js

  coding-challenges:
    name: 💻 Coding Challenges
    if: |
      always() &&
      ((github.event.schedule == '0 2 * * *') ||
      (github.event_name == 'workflow_dispatch' && (inputs.mode == 'full-pipeline' || inputs.stage == 'coding-challenges')))
    needs: [processor]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-bot
      - name: Generate Coding Challenges
        env:
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          SQLITE_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          INPUT_COUNT: ${{ inputs.count || '2' }}
          INPUT_DIFFICULTY: 'random'
          INPUT_CATEGORY: 'random'
        run: node script/coding-challenge-bot.js

  flashcard-generation:
    name: 🃏 Flashcard Generation
    if: |
      (github.event.schedule == '0 8 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'full-pipeline')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-bot
      - name: Run Flashcard Bot
        env:
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          SQLITE_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: node script/bots/flashcard-bot.js

  update-monitor:
    name: 📊 Update Monitor
    needs: [blog-generator, voice-sessions, interview-intelligence, flashcard-generation, coding-challenges]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-node-pnpm
      - name: Generate monitor data
        env:
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          SQLITE_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: node script/fetch-bot-monitor-data.js
      
      - name: Commit and push with retry
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          MAX_RETRIES=3
          RETRY_DELAY=5
          
          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $attempt/$MAX_RETRIES: Committing and pushing changes..."
            
            # Add files
            git add -f client/public/data/bot-monitor.json || true
            git add -f client/public/data/intelligence/ || true
            git add -f client/public/data/voice-sessions/ || true
            
            # Check if there are staged changes
            if ! git diff --staged --quiet; then
              echo "Changes detected, committing..."
              git commit -m "Update bot monitor [skip ci]" || {
                echo "Commit failed, retrying..."
                continue
              }
            else
              echo "No changes to commit, skipping..."
              exit 0
            fi
            
            # Sync with remote before pushing
            echo "Syncing with remote..."
            git fetch origin main --quiet
            if ! git merge-base --is-ancestor HEAD origin/main; then
              echo "Local branch is behind remote, rebasing..."
              git rebase origin/main || {
                echo "Rebase failed, cleaning up..."
                git rebase --abort 2>/dev/null || true
                git reset --hard origin/main
                # Regenerate monitor data on latest state
                node script/fetch-bot-monitor-data.js
                git add -f client/public/data/bot-monitor.json || true
                git add -f client/public/data/intelligence/ || true
                git add -f client/public/data/voice-sessions/ || true
                if ! git diff --staged --quiet; then
                  git commit -m "Update bot monitor [skip ci]" || true
                fi
              }
            fi
            
            # Try to push
            if git push origin main; then
              echo "✅ Push succeeded on attempt $attempt"
              exit 0
            else
              echo "❌ Push failed on attempt $attempt"
              if [ $attempt -lt $MAX_RETRIES ]; then
                echo "Waiting ${RETRY_DELAY}s before retry..."
                sleep $RETRY_DELAY
                # Reset for next attempt
                git reset --hard origin/main
              fi
            fi
          done
          
          echo "❌ Failed to push after $MAX_RETRIES attempts"
          exit 1

  summary:
    name: 📋 Summary
    needs: [quick-generate, creator, maintenance, analysis, verifier, processor, blog-generator, voice-sessions, interview-intelligence, flashcard-generation, update-monitor]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Summary
        run: |
          echo "## 🤖 Content Generation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 Quick | ${{ needs.quick-generate.result == 'success' && '✅' || needs.quick-generate.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📝 Creator | ${{ needs.creator.result == 'success' && '✅' || needs.creator.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Analysis | ${{ needs.analysis.result == 'success' && '✅' || needs.analysis.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Verifier | ${{ needs.verifier.result == 'success' && '✅' || needs.verifier.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚙️ Processor | ${{ needs.processor.result == 'success' && '✅' || needs.processor.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📰 Blog | ${{ needs.blog-generator.result == 'success' && '✅' || needs.blog-generator.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎤 Voice | ${{ needs.voice-sessions.result == 'success' && '✅' || needs.voice-sessions.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧠 Intelligence | ${{ needs.interview-intelligence.result == 'success' && '✅' || needs.interview-intelligence.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🃏 Flashcards | ${{ needs.flashcard-generation.result == 'success' && '✅' || needs.flashcard-generation.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📊 Monitor | ${{ needs.update-monitor.result == 'success' && '✅' || needs.update-monitor.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
