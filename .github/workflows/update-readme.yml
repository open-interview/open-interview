name: Update README

on:
  push:
    branches: [main]
    paths:
      - 'client/src/lib/channels-config.ts'
      - 'script/generate-readme.js'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node-pnpm

      - run: node script/generate-readme.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (git add README.md && git commit -m "chore: auto-update README sections [skip ci]" && git push)
