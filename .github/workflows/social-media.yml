name: 📊 Social Media & Analytics

# Unified social media workflow
# Combines: social-analytics.yml + linkedin-poll.yml
# Handles: LinkedIn posts, polls, and analytics collection

on:
  schedule:
    # Daily at 5 AM: Social analytics
    - cron: '0 5 * * *'
    # Weekly Tuesday 15:00 UTC (10 AM ET): LinkedIn poll
    - cron: '0 15 * * 2'
  
  workflow_dispatch:
    inputs:
      task:
        description: 'Task to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - linkedin-post
          - linkedin-poll
          - analytics
      # LinkedIn post inputs
      post_url:
        description: 'Specific blog post URL (for linkedin-post)'
        required: false
        type: string
      # LinkedIn poll inputs
      question_id:
        description: 'Question ID for poll (for linkedin-poll)'
        required: false
        default: ''
      channel:
        description: 'Filter by channel (for linkedin-poll)'
        required: false
        default: ''
      difficulty:
        description: 'Filter by difficulty (for linkedin-poll)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - beginner
          - intermediate
          - advanced
      poll_duration:
        description: 'Poll duration in hours (for linkedin-poll)'
        required: false
        default: '360'
      dry_run:
        description: 'Dry run (test without posting)'
        required: false
        default: false
        type: boolean
      # New: Topic/Subtopic/Concept for use-case polls
      topic:
        description: 'Topic for use-case poll (e.g., sre, kubernetes, devops)'
        required: false
        default: ''
      subtopic:
        description: 'Subtopic (e.g., on-call, networking, ci-cd)'
        required: false
        default: ''
      concept:
        description: 'Concept to poll about (e.g., incident response, cgroups)'
        required: false
        default: ''
      use_poll_usecase:
        description: 'Use use-case workflow (searches web first)'
        required: false
        default: false
        type: boolean

jobs:
  linkedin-post:
    name: 📢 LinkedIn Post
    if: |
      (github.event.schedule == '0 5 * * *') ||
      (github.event_name == 'workflow_dispatch' && (inputs.task == 'all' || inputs.task == 'linkedin-post'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-bot

      - name: Get latest blog post
        id: get_post
        run: node script/get-latest-blog-post.js
        env:
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          SPECIFIC_URL: ${{ inputs.post_url }}

      - name: Publish to LinkedIn
        if: steps.get_post.outputs.has_post == 'true'
        id: publish
        run: node script/publish-to-linkedin.js
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          POST_TITLE: ${{ steps.get_post.outputs.title }}
          POST_URL: ${{ steps.get_post.outputs.url }}
          POST_EXCERPT: ${{ steps.get_post.outputs.excerpt }}
          POST_TAGS: ${{ steps.get_post.outputs.tags }}
          POST_CHANNEL: ${{ steps.get_post.outputs.channel }}
          POST_QUICK_REFERENCE: ${{ steps.get_post.outputs.quick_reference }}
          POST_SOCIAL_HOOK: ${{ steps.get_post.outputs.social_hook }}
          POST_SOCIAL_BODY: ${{ steps.get_post.outputs.social_body }}
          POST_REAL_WORLD_EXAMPLE: ${{ steps.get_post.outputs.real_world_example }}
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}

      - name: Mark post as shared
        if: steps.get_post.outputs.has_post == 'true' && steps.publish.outputs.posted == 'true'
        run: node script/mark-post-shared.js
        env:
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          POST_ID: ${{ steps.get_post.outputs.post_id }}

  linkedin-poll:
    name: 📊 LinkedIn Poll
    if: |
      (github.event.schedule == '0 15 * * 2') ||
      (github.event_name == 'workflow_dispatch' && (inputs.task == 'all' || inputs.task == 'linkedin-poll'))
    runs-on: ubuntu-latest
    timeout-minutes: 35
    outputs:
      blog_generated: ${{ steps.poll.outputs.blog_generated }}
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-bot

      - name: Post Poll to LinkedIn
        id: poll
        env:
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          QUESTION_ID: ${{ inputs.question_id }}
          CHANNEL: ${{ inputs.channel }}
          DIFFICULTY: ${{ inputs.difficulty }}
          POLL_DURATION: ${{ inputs.poll_duration || '360' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: node script/post-linkedin-poll.js

      - name: Trigger blog deploy (new blog was generated)
        if: steps.poll.outputs.blog_generated == 'true'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-blog.yml',
              ref: 'main'
            });
            console.log('✅ Blog deploy triggered for newly generated post');

  linkedin-poll-usecase:
    name: 📊 LinkedIn Poll (Use Case)
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.use_poll_usecase == true)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-bot

      - name: Post Poll with Use Case
        id: poll_usecase
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          TOPIC: ${{ inputs.topic }}
          SUBTOPIC: ${{ inputs.subtopic }}
          CONCEPT: ${{ inputs.concept }}
          CHANNEL: ${{ inputs.channel || inputs.topic }}
        run: node script/post-linkedin-poll-usecase.js
  analytics:
    name: 📈 GitHub Analytics
    if: |
      (github.event.schedule == '0 5 * * *') ||
      (github.event_name == 'workflow_dispatch' && (inputs.task == 'all' || inputs.task == 'analytics'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-node-pnpm

      - name: Collect GitHub Analytics
        run: node script/github-analytics-bot.js
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          REPO_OWNER: satishkumar-dhule
          REPO_NAME: code-reels
          PAGES_REPO_OWNER: open-interview
          PAGES_REPO_NAME: open-interview.github.io

  opencode-poll-generator:
    name: 🤖 OpenCode Poll Generator
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.task == 'opencode-poll')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-bot
      - name: Run poll-generator agent
        run: opencode run "Generate a LinkedIn poll for this week" --agent poll-generator
  summary:
    name: 📋 Summary
    needs: [linkedin-post, linkedin-poll, linkedin-poll-usecase, analytics, opencode-poll-generator]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Summary
        run: |
          echo "## 📊 Social Media & Analytics Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Task | Status | Notes |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📢 LinkedIn Post | ${{ needs.linkedin-post.result == 'success' && '✅' || needs.linkedin-post.result == 'skipped' && '⏭️' || '❌' }} | Blog post shared |" >> $GITHUB_STEP_SUMMARY
          echo "| 📊 LinkedIn Poll | ${{ needs.linkedin-poll.result == 'success' && '✅' || needs.linkedin-poll.result == 'skipped' && '⏭️' || '❌' }} | ${{ needs.linkedin-poll.outputs.blog_generated == 'true' && '📝 New blog generated + deploy triggered' || 'Blog already existed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📊 Poll (Use Case) | ${{ needs.linkedin-poll-usecase.result == 'success' && '✅' || needs.linkedin-poll-usecase.result == 'skipped' && '⏭️' || '❌' }} | ${{ inputs.topic }}/${{ inputs.subtopic }}/${{ inputs.concept }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📈 Analytics | ${{ needs.analytics.result == 'success' && '✅' || needs.analytics.result == 'skipped' && '⏭️' || '❌' }} | GitHub stats collected |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
