name: 🚀 CI/CD Pipeline

# Replaces: deploy.yml + lighthouse.yml + manual-e2e.yml

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/workflows/content.yml'
      - '.github/workflows/social.yml'
      - '.github/workflows/community.yml'
      - '.github/workflows/maintenance.yml'
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: false
        default: 'all'
        type: choice
        options: [all, staging, production]
      reason:
        description: 'Reason for manual deployment'
        required: false
        default: 'Manual trigger'
      run_e2e:
        description: 'Run E2E tests'
        required: false
        default: true
        type: boolean
      e2e_pattern:
        description: 'E2E test pattern (file or grep)'
        required: false
        default: 'e2e/core.spec.ts'
      e2e_browser:
        description: 'Browser for E2E tests'
        required: false
        default: 'chromium'
        type: choice
        options: [chromium, firefox, webkit, all]

concurrency:
  group: deployment-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      deploy-staging: ${{ steps.determine-env.outputs.staging }}
      deploy-production: ${{ steps.determine-env.outputs.production }}
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
      - uses: ./.github/actions/setup-node-pnpm

      - name: Determine deployment environments
        id: determine-env
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "staging=true" >> $GITHUB_OUTPUT
            echo "production=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "staging=false" >> $GITHUB_OUTPUT
            echo "production=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "staging=false" >> $GITHUB_OUTPUT
            echo "production=false" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ github.event.inputs.environment }}" == "staging" ]]; then
              echo "staging=true" >> $GITHUB_OUTPUT; echo "production=false" >> $GITHUB_OUTPUT
            elif [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
              echo "staging=false" >> $GITHUB_OUTPUT; echo "production=true" >> $GITHUB_OUTPUT
            else
              echo "staging=true" >> $GITHUB_OUTPUT; echo "production=true" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Fetch data from database
        run: |
          pnpm run fetch:data
          pnpm run fetch:history
          pnpm run generate:paths
          pnpm run generate:rss
          pnpm run generate:sitemap
          pnpm run fetch:bot-monitor

      - name: Build application
        run: |
          pnpm run build
          pnpm run build:pagefind
        env:
          VITE_BASE_URL: '/'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist/public
          retention-days: 1

  quality:
    name: 🔍 Quality (E2E + Lighthouse)
    needs: build
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-node-pnpm

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build
          path: dist/public

      - name: Install Playwright
        run: |
          BROWSER="${{ github.event.inputs.e2e_browser || 'chromium' }}"
          if [ "$BROWSER" = "all" ]; then
            pnpm exec playwright install --with-deps
          else
            pnpm exec playwright install --with-deps $BROWSER
          fi

      - name: Run E2E smoke tests
        if: github.event.inputs.run_e2e != 'false'
        run: |
          PATTERN="${{ github.event.inputs.e2e_pattern || 'e2e/core.spec.ts' }}"
          BROWSER="${{ github.event.inputs.e2e_browser || 'chromium' }}"
          PROJECT="chromium-desktop"
          if [ "$BROWSER" != "chromium" ] && [ "$BROWSER" != "all" ]; then PROJECT="$BROWSER"; fi
          if [[ "$PATTERN" == *".spec.ts"* ]] || [[ "$PATTERN" == *"e2e/"* ]]; then
            pnpm exec playwright test "$PATTERN" --project=$PROJECT
          else
            pnpm exec playwright test --grep "$PATTERN" --project=$PROJECT
          fi
        continue-on-error: true
        env:
          CI: 'true'

      - name: Run Lighthouse audit
        run: pnpm exec playwright test --project=lighthouse --reporter=list
        continue-on-error: true
        env:
          CI: 'true'

      - name: Upload quality reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-reports-${{ github.run_number }}
          path: |
            test-results/
            playwright-report/
            lighthouse-reports/
          retention-days: 7

  staging:
    name: 🧪 Deploy Staging
    needs: build
    if: needs.build.outputs.deploy-staging == 'true'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://stage-open-interview.github.io
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          name: build
          path: dist

      - uses: ./.github/actions/deploy-pages
        with:
          source-dir: dist
          repo: stage-open-interview/stage-open-interview.github.io
          branch: main
          token: ${{ secrets.GH_TOKEN }}
          commit-message: 'Deploy: ${{ github.sha }} [skip ci]'
          preserve-cname: 'false'

  production:
    name: 🌐 Deploy Production
    needs: [build, staging]
    if: |
      always() &&
      needs.build.outputs.deploy-production == 'true' &&
      (needs.staging.result == 'success' || needs.staging.result == 'skipped')
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://open-interview.github.io
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-node-pnpm
        with:
          install: 'false'

      - uses: actions/download-artifact@v4
        with:
          name: build
          path: dist

      - uses: ./.github/actions/deploy-pages
        with:
          source-dir: dist
          repo: open-interview/open-interview.github.io
          branch: gh-pages
          token: ${{ secrets.GH_TOKEN }}
          commit-message: 'Deploy: ${{ github.sha }} [skip ci]'
          preserve-cname: 'true'

      - name: Ping search engines
        run: pnpm run seo:ping
        continue-on-error: true

      - name: Post-deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Production URL** | https://open-interview.github.io |" >> $GITHUB_STEP_SUMMARY
          echo "| **Timestamp** | $(date -u +'%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
