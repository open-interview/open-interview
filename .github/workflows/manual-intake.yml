name: 🎲 Manual Intake

# Manually add a question to the database

on:
  workflow_dispatch:
    inputs:
      question:
        description: 'Your question (will be mapped to channel and refined)'
        required: true
        type: string

jobs:
  intake:
    name: 📥 Process Question
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-bot

      - name: Process and add question
        run: node script/add-random-question.js
        env:
          INPUT_QUESTION: ${{ inputs.question }}
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          CI: 'true'

      - name: Regenerate RSS feed
        run: node script/generate-rss.js
        env:
          SQLITE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          

      - name: Trigger deploy
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main'
            });

      - name: Summary
        run: |
          echo "## 🎲 Question Added" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Input:** ${{ inputs.question }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Question processed and added" >> $GITHUB_STEP_SUMMARY
          echo "✅ RSS feed regenerated" >> $GITHUB_STEP_SUMMARY
          echo "✅ Deploy triggered" >> $GITHUB_STEP_SUMMARY
