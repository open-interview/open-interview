<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Open-Interview</title>
  <script>
    (function() {
      var location = window.location;
      var path = location.pathname;
      var search = location.search;
      var hash = location.hash;
      
      // Store the intended path in sessionStorage (primary)
      try {
        sessionStorage.setItem('spa-redirect', JSON.stringify({
          path: path,
          search: search,
          hash: hash
        }));
      } catch(e) {}
      
      // Also encode path in URL query param as fallback (works without sessionStorage)
      var encoded = encodeURIComponent(path + search + hash);
      location.replace(
        location.protocol + '//' + location.host + '/?spa-redirect=true&p=' + encoded
      );
    })();
  </script>
</head>
<body></body>
</html>
